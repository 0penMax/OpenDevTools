name: Create release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  run_tests_build_linux_and_windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: go mod tidy

      - name: Install X11 and GTK3 development libraries
        run: |
          sudo apt update
          sudo apt install -y libx11-dev libgtk-3-dev

      - name: Run tests
        run: go test ./...

      - name: Build for linux amd64
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: go build -o output/odt-linux .


      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: output/*

  build_windows_native:
    needs: run_tests_build_linux_and_windows
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: go mod tidy

      - name: Ensure output dir
        run: if not exist output mkdir output

      - name: Build for windows amd64 (native cgo using MSVC)
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: go build -o output/odt-windows.exe .

      - name: Upload Windows native artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-binaries
          path: output/odt-windows.exe

  build_mac_os:
    needs: run_tests_build_linux_and_windows
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: go mod tidy

      - name: Build for macos amd64
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: amd64
        run: go build -o output/odt-macos .

      - name: Build for macos arm64
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: arm64
        run: go build -o output/odt-macos-arm .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: output/*

  release:
    needs: [build_mac_os, build_windows_native]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-windows-binaries
          path: output/

      - name: Download Windows native Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-native-binaries
          path: output/

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: output/

      - name: List output directory
        run: ls -la output/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: "commit-${{ github.sha }}"
        run: |
          gh release create "$tag" \
            --repo="$GITHUB_REPOSITORY" \
            --title="release-$tag" \
            --generate-notes \
            output/*